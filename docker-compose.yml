version: '3.8'

services:
  # 1. Servis: Veritabanımız (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: kobi_db
    environment:
      # .env dosyamızdaki şifrelerle aynı olmalı!
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: kobi_os
    volumes:
      # Veritabanı verilerinin bilgisayarımızda kalıcı olarak saklanmasını sağlar.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Bu servis 'sağlıklı' olmadan diğerleri başlamasın diyoruz.
      test: ["CMD-SHELL", "pg_isready -U admin -d kobi_os"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - kobi_network

  # 2. Servis: Backend Uygulamamız (FastAPI)
  api:
    # Yukarıda yazdığımız Dockerfile'ı kullanarak bu servisi inşa et diyoruz.
    build: .
    container_name: kobi_api
    env_file:
      - .env
    ports:
      # Bilgisayarımızın 8000 portunu, konteynerin 8000 portuna bağlıyoruz.
      - "8000:8000"
    volumes:
      # Kodda yaptığımız değişikliklerin anında konteynere yansıması için.
      - ./app:/code/app
    depends_on:
      db:
        # Sadece veritabanı servisi sağlıklı olduğunda bu servisi başlat.
        condition: service_healthy
    networks:
      - kobi_network

  # 3. Servis: Frontend Arayüzümüz (Streamlit)
  # NOT: Bunun için ayrı bir Dockerfile gerekecek, şimdilik böyle bırakalım.
  # Bir sonraki adımda Streamlit kodunu yazınca burayı tamamlayacağız.
  ui:
    # Bu kısmı şimdilik boş bırakıyoruz, sonra dolduracağız.
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kobi_ui
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - kobi_network

# Servislerin birbiriyle konuşacağı sanal ağı tanımlıyoruz.
networks:
  kobi_network:
    driver: bridge

# Veritabanı verilerinin saklanacağı kalıcı alanı tanımlıyoruz.
volumes:
  postgres_data: